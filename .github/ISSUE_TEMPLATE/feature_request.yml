name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion. Please describe what you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is this something that frustrates you, or a gap you've noticed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change as clearly as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches that might work?

  - type: textarea
    id: context
    attributes:
      label: Anything else?
