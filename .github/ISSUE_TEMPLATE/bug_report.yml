name: Bug report
description: Something is broken or not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL (if applicable)
      placeholder: https://lede.timothybrits.co.za/...

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Browser, device, screenshots — anything that might help.
