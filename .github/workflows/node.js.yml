name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - name: Cache Vite cache
        uses: actions/cache@v5
        with:
          path: node_modules/.vite
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-vite-${{ hashFiles('package-lock.json', 'vite.config.*', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-vite-
      - run: npm run build --if-present
      - run: npm test --if-present
