$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  build:
    command: 'npx tsc --noEmit'
    inputs:
      - 'src/**/*.ts'
      - 'tsconfig.json'

  dev:
    command: 'npx wrangler dev --test-scheduled'
    preset: 'server'

  test:
    command: 'npx vitest run'
    inputs:
      - 'src/**/*.ts'

  lint:
    command: 'npx biome check --write .'
    inputs:
      - 'src/**/*.ts'
      - '/biome.json'
      - '/*.json'

  typecheck:
    command: 'npx tsc --noEmit'
    inputs:
      - 'src/**/*.ts'
      - 'tsconfig.json'
