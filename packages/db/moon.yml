$schema: 'https://moonrepo.dev/schemas/project.json'

tasks:
  build:
    command: 'npx tsc --noEmit'
    inputs:
      - 'src/**/*.ts'
      - 'tsconfig.json'

  typecheck:
    command: 'npx tsc --noEmit'
    inputs:
      - 'src/**/*.ts'
      - 'tsconfig.json'

  lint:
    command: 'npx biome check --write .'
    inputs:
      - 'src/**/*.ts'
      - '/biome.json'
      - '/*.json'
